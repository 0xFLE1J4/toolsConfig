# ~/.tmux.conf

# ====================
# GLOBAL OPTIONS
# ====================
# Set default shell to Zsh
set-option -g default-shell /bin/zsh

# Enable mouse support
set -g mouse on

# Start window and pane numbering at 1 instead of 0
set -g base-index 1
set -g pane-base-index 1

# Enable 256-color support
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Prevent tmux from detaching when a session is destroyed
set -g detach-on-destroy off

# Increase scrollback history
set -g history-limit 10000

# Reduce delay for repeated key bindings
set -g repeat-time 300


# ====================
# PREFIX KEY (ALT + A)
# ====================
# Change prefix from default Ctrl-b to Alt-a
set -g prefix M-a
unbind C-b
bind M-a send-prefix


# ====================
# STATUS BAR (ZELLIJ-INSPIRED STYLE)
# ====================
# Position the status bar at the top
set -g status-position top

# Refresh status bar every 5 seconds
set -g status-interval 5

# Set background color
set -g status-bg "#282828"

# Remove spacing between window tabs for seamless separators
set -g window-status-separator ""

# Left section: Session name (orange/rust style)
set -g status-left "#[bg=#fe8019,fg=black,bold] Tmux (#S) #[fg=#fe8019,bg=#282828]"
set -g status-left-length 40

# Window tabs
# Inactive window (gray)
set -g window-status-format "#[fg=#282828,bg=#504945]#[fg=white,bg=#504945] #I: #W #[fg=#504945,bg=#282828]"

# Active window (Zellij-inspired green)
set -g window-status-current-format "#[fg=#282828,bg=#a8cc8c]#[fg=black,bg=#a8cc8c,bold] #I: #W #[fg=#a8cc8c,bg=#282828]"

# Right section: tun0 IP address + key hint
set -g status-right "#[fg=#504945,bg=#282828]#[bg=#504945,fg=white] tun0: #(ip addr show tun0 2>/dev/null | grep 'inet ' | awk '{print $2}' | cut -d'/' -f1) #[fg=#a8cc8c,bg=#504945]#[bg=#a8cc8c,fg=black,bold] Alt <a> "
set -g status-right-length 80


# ====================
# FULLSCREEN & PANE MANAGEMENT
# ====================
# Toggle fullscreen for the current pane (prefix + f)
bind -r f resize-pane -Z

# Close the current pane (prefix + x)
bind x kill-pane


# ====================
# PANE SPLITTING
# ====================
# Split vertically (preserve current working directory)
bind v split-window -v -c "#{pane_current_path}"

# Split horizontally (preserve current working directory)
bind b split-window -h -c "#{pane_current_path}"


# ====================
# VIM-LIKE NAVIGATION (QWERTY)
# ====================
# Navigate panes using hjkl (with prefix)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Navigate panes using Alt + arrow keys (no prefix required)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D


# ====================
# VIM-LIKE RESIZING (QWERTY)
# ====================
# Resize panes using Shift + HJKL (with prefix)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5


# ====================
# WINDOW MANAGEMENT (QWERTY NUMBERS & RENAMING)
# ====================
# Switch between windows using numbers
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
bind 7 select-window -t 7
bind 8 select-window -t 8
bind 9 select-window -t 9

# Rename the current window (prefix + ,)
bind , command-prompt -I "#W" "rename-window '%%'"


# ====================
# MISCELLANEOUS SHORTCUTS
# ====================
# Reload tmux configuration
bind r source-file ~/.tmux.conf \; display "Config reloaded!"
